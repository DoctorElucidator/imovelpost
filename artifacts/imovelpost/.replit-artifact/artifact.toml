kind = "web"
previewPath = "/"
title = "ImóvelPost"
version = "1.0.0"
id = "artifacts/imovelpost"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21322

[services.development]
run = "pnpm --filter @workspace/imovelpost run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/imovelpost", "run", "build" ]
publicDir = "artifacts/imovelpost/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21322"
BASE_PATH = "/"
